<!doctype html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0b0f14" />
  <title>Cr0w — Post</title>
  <link rel="icon" href="assets/crow-logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="nav glass compact">
    <div class="nav-inner container">
      <a class="btn btn-ghost" href="index.html">← گەڕانەوە</a>

      <a class="brand mini" href="./" aria-label="Cr0w Home">
        <span class="logo-wrap" aria-hidden="true">
          <img class="logo small" src="assets/crow-logo.svg" alt="" />
        </span>
        <span class="brand-text">
          <span class="brand-name" data-glitch="Cr0w">Cr0w</span>
        </span>
      </a>

      <div class="actions">
        <button id="themeBtn" class="icon-btn" type="button" aria-label="گۆڕینی ڕەنگ">🌓</button>
      </div>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <article id="post" class="post glass"></article>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-left">
        <img class="logo small" src="assets/crow-logo.svg" alt="" aria-hidden="true" />
        <span>© <span id="year"></span> Cr0w</span>
      </div>
      <div class="footer-right muted">Built on Cloudflare Pages</div>
    </div>
  </footer>

  <script src="js/post.js"></script>
</body>
</html>
